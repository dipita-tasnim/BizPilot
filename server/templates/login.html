<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BizPilot</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .messages {
            margin-bottom: 20px;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .alert-error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #dc2626;
        }
        .alert-success {
            background-color: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #16a34a;
        }
    </style>
</head>
<body>
    <!-- Back to Home -->
    <div class="back-home">
        <a href="{% url 'main:home' %}">
            <span>←</span>
            <span>Back to Home</span>
        </a>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle-login" id="themeToggle">
        <span id="themeText">🌙</span>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-overlay"></div>
        
        <div class="login-card">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your BizPilot account</p>
            </div>

            <form class="login-form" id="loginForm" method="post" action="{% url 'main:login' %}">
                {% csrf_token %}
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <button class="google-btn" id="googleSignIn">
                <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20" aria-hidden="true">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12  s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C33.643,6.053,29.084,4,24,4C12.955,4,4,12.955,4,24  s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,16.021,18.961,13,24,13c3.059,0,5.842,1.154,7.961,3.039  l5.657-5.657C33.643,6.053,29.084,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.196l-6.19-5.238C29.147,35.49,26.715,36.5,24,36.5  c-5.189,0-9.6-3.317-11.243-7.946l-6.522,5.027C9.545,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.793,2.239-2.231,4.166-3.994,5.567  c0,0,6.19,5.238,6.19,5.238C39.403,36.324,44,30.5,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
                <span>Continue with Google</span>
            </button>

            <div class="divider">
                <span>New to BizPilot?</span>
            </div>

            <div class="login-links">
                <a href="register.html">Create an account</a>
            </div>

            <div class="login-links login-links-spacing">
                <a href="forgot-password.html">Forgot your password?</a>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle Functionality
        const themeToggle = document.getElementById('themeToggle');
        const themeText = document.getElementById('themeText');
        const body = document.body;

        // Check for saved theme preference or default to light mode
        const currentTheme = localStorage.getItem('theme') || 'light';
        body.setAttribute('data-theme', currentTheme);
        updateThemeText(currentTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeText(newTheme);
        });

        function updateThemeText(theme) {
            if (theme === 'dark') {
                themeText.textContent = '☀️';
            } else {
                themeText.textContent = '🌙';
            }
        }

        // Login form handling - Let Django handle authentication
        // Form will submit normally to Django backend
        
        // Google Sign-In button (demo redirect)
        const googleBtn = document.getElementById('googleSignIn');
        if (googleBtn) {
            googleBtn.addEventListener('click', function() {
                // TODO: Replace with real Google OAuth
                alert('Google OAuth integration coming soon!');
            });
        }
    </script>
</body>
</html>
